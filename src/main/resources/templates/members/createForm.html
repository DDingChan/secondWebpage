<!Doctype html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
</head>
<body>
    <div>
        <form action="/member/new" method="post">
            <div class="form-group">
                <label for="userId">아이디</label>
                <input type="text" id="userId" name="userId" placeholder="ID를 입력하세요.">

                <label for="password">비밀번호</label>
                <input type="text" id="password" name="password" placeholder="password를 입력하세요.">

                <label for="name">이름</label>
                <input type="text" id="name" name="name" placeholder="이름을 입력하세요.">

                <label for="email">email</label>
                <input type="text" id="email" name="email" placeholder="email을 입력하세요.">

                <label for="telNum">전화 번호</label>
                <input type="text" id="telNum" name="telNum" placeholder="전화번호를 입력하세요.">

                <label for="digitNum">주민 번호</label>
                <input type="text" id="digitNum" name="digitNum" placeholder="주민번호를 입력하세요.">

            </div>
            <button type="submit">등록</button>
        </form>
    </div>
</body>
</html>
