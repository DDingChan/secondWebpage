<!Doctype html>
<html xmlns:th="www.thymeleaf.org">

<head>
    <meta charset="utf-8">
</head>

<body>
    <div>
        <table>
            <thead>
                <tr>
                    <th>#</th>
                    <th>userId</th>
                    <th>password</th>
                    <th>name</th>
                    <th>email</th>
                    <th>telNum</th>
                    <th>digitNum</th>
                </tr>
            </thead>
            <body>
                <tr th:each="member:${members}">
                    <td th:text="${member.id}"></td>
                    <td th:text="${member.userId}"></td>
                    <td th:text="${member.password}"></td>
                    <td th:text="${member.name}"></td>
                    <td th:text="${member.email}"></td>
                    <td th:text="${member.telNum}"></td>
                    <td th:text="${member.digitNum}"></td>
                </tr>
            </body>
        </table>
    </div>
</body>

</html>
